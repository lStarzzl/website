<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Executor - Key System</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --dark: #2d3436;
            --light: #f5f6fa;
            --danger: #d63031;
            --success: #00b894;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background-color: rgba(45, 52, 54, 0.8);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--primary);
        }
        
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #333;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background-color: #5649c0;
        }
        
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .success {
            background-color: rgba(0, 184, 148, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }
        
        .error {
            background-color: rgba(214, 48, 49, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }
        
        .key-display {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            font-size: 18px;
            text-align: center;
            margin: 20px 0;
            word-break: break-all;
        }
        
        .timer {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            border-bottom: 3px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOID EXECUTOR KEY SYSTEM</h1>
        
        <div class="tabs">
            <div class="tab active" id="validateTab">Validate Key</div>
            <div class="tab" id="generateTab">Generate Key</div>
        </div>
        
        <!-- Validate Key Section -->
        <div id="validateSection">
            <div class="input-group">
                <label for="keyInput">Enter Your License Key:</label>
                <input type="text" id="keyInput" placeholder="XXXX-XXXX-XXXX-XXXX">
            </div>
            <button id="validateBtn">VALIDATE KEY</button>
            <div id="validateResult" class="result"></div>
        </div>
        
        <!-- Generate Key Section -->
        <div id="generateSection" style="display: none;">
            <div class="key-display" id="generatedKey">Press button to generate</div>
            <div class="timer" id="expiryTimer"></div>
            <button id="generateBtn">GENERATE NEW KEY</button>
            <div id="generateResult" class="result"></div>
        </div>
    </div>

    <script>
        // Configuration - Change these to match your backend
        const API_ENDPOINT = "http://localhost:3000"; // Change to your Vercel/Firebase URL when deployed
        let currentKey = null;
        let expiryTime = null;
        let timerInterval = null;

        // DOM Elements
        const validateTab = document.getElementById('validateTab');
        const generateTab = document.getElementById('generateTab');
        const validateSection = document.getElementById('validateSection');
        const generateSection = document.getElementById('generateSection');
        const validateBtn = document.getElementById('validateBtn');
        const generateBtn = document.getElementById('generateBtn');
        const keyInput = document.getElementById('keyInput');
        const generatedKey = document.getElementById('generatedKey');
        const expiryTimer = document.getElementById('expiryTimer');
        const validateResult = document.getElementById('validateResult');
        const generateResult = document.getElementById('generateResult');

        // Tab Switching
        validateTab.addEventListener('click', () => {
            validateTab.classList.add('active');
            generateTab.classList.remove('active');
            validateSection.style.display = 'block';
            generateSection.style.display = 'none';
        });

        generateTab.addEventListener('click', () => {
            generateTab.classList.add('active');
            validateTab.classList.remove('active');
            validateSection.style.display = 'none';
            generateSection.style.display = 'block';
        });

        // Key Validation
        validateBtn.addEventListener('click', async () => {
            const key = keyInput.value.trim();
            
            if (!key) {
                showResult(validateResult, 'Please enter a key', 'error');
                return;
            }
            
            if (!isValidKeyFormat(key)) {
                showResult(validateResult, 'Invalid key format. Should be XXXX-XXXX-XXXX-XXXX', 'error');
                return;
            }
            
            validateBtn.disabled = true;
            validateBtn.textContent = 'Validating...';
            
            try {
                const isValid = await validateKey(key);
                
                if (isValid) {
                    showResult(validateResult, '✅ Key is valid! Access granted.', 'success');
                    // Here you would typically grant access to the application
                } else {
                    showResult(validateResult, '❌ Key is invalid or expired', 'error');
                }
            } catch (error) {
                showResult(validateResult, '⚠️ Error validating key: ' + error.message, 'error');
            } finally {
                validateBtn.disabled = false;
                validateBtn.textContent = 'VALIDATE KEY';
            }
        });

        // Key Generation
        generateBtn.addEventListener('click', async () => {
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';
            
            try {
                const keyData = await generateKey();
                currentKey = keyData.key;
                expiryTime = keyData.expiry;
                
                generatedKey.textContent = currentKey;
                showResult(generateResult, 'Key generated successfully', 'success');
                startExpiryTimer();
            } catch (error) {
                showResult(generateResult, 'Error generating key: ' + error.message, 'error');
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'GENERATE NEW KEY';
            }
        });

        // Helper Functions
        function isValidKeyFormat(key) {
            return /^[A-Z]{4}-[A-Z]{4}-[A-Z]{4}-[A-Z]{4}$/.test(key);
        }

        function showResult(element, message, type) {
            element.textContent = message;
            element.className = 'result ' + type;
        }

        function startExpiryTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const now = Date.now();
                const diff = expiryTime - now;
                
                if (diff <= 0) {
                    clearInterval(timerInterval);
                    expiryTimer.textContent = 'Key expired';
                    currentKey = null;
                    expiryTime = null;
                } else {
                    const minutes = Math.floor(diff / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    expiryTimer.textContent = `Expires in: ${minutes}m ${seconds.toString().padStart(2, '0')}s`;
                }
            }, 1000);
        }

        // API Communication
        async function validateKey(key) {
            // For local testing without backend
            if (API_ENDPOINT.includes('localhost')) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        // Simulate validation - replace with actual API call
                        resolve(Math.random() > 0.3); // 70% chance of being valid for demo
                    }, 800);
                });
            }
            
            const response = await fetch(`${API_ENDPOINT}/validate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key })
            });
            
            if (!response.ok) throw new Error('Server error');
            const data = await response.json();
            return data.valid;
        }

        async function generateKey() {
            // For local testing without backend
            if (API_ENDPOINT.includes('localhost')) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                        let key = '';
                        for (let i = 0; i < 4; i++) {
                            for (let j = 0; j < 4; j++) {
                                key += chars.charAt(Math.floor(Math.random() * chars.length));
                            }
                            if (i < 3) key += '-';
                        }
                        resolve({
                            key,
                            expiry: Date.now() + 5 * 60 * 1000 // 5 minutes
                        });
                    }, 800);
                });
            }
            
            const response = await fetch(`${API_ENDPOINT}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (!response.ok) throw new Error('Server error');
            return await response.json();
        }
    </script>
</body>
</html>
